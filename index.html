        // ========== APP INITIALIZATION ==========
        document.addEventListener('DOMContentLoaded', () => {
            // Check if user is already logged in (sessionStorage)
            const savedProfile = sessionStorage.getItem('imenaProfile');
            if (savedProfile) {
                currentProfile = JSON.parse(savedProfile);
                currentUser = { id: currentProfile.id };
                showMainApp();
            } else {
                showAuth();
            }

            // Setup form listeners
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('registerForm').addEventListener('submit', handleRegister);
        });

        // ========== AUTHENTICATION FUNCTIONS ==========
        function showAuth() {
            document.getElementById('authContainer').classList.remove('hidden');
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('mobileMenuBtn').classList.add('hidden');
        }

        function showMainApp() {
            document.getElementById('authContainer').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('mobileMenuBtn').classList.remove('hidden');
            buildInterface();
        }

        function handleLogin(e) {
            e.preventDefault();
            
            // Simple demo authentication
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showAuthMessage('Please enter email and password', 'error');
                return;
            }

            // Create demo profile
            currentProfile = {
                id: 'user-' + Date.now(),
                full_name: email.split('@')[0] || 'IMENA Learner',
                role: email.includes('teacher') ? 'teacher' : 'student',
                education_level: 'S3',
                preferred_language: 'english'
            };

            currentUser = { id: currentProfile.id };
            
            // Save to sessionStorage
            sessionStorage.setItem('imenaProfile', JSON.stringify(currentProfile));
            
            showAuthMessage('Login successful!', 'success');
            setTimeout(() => showMainApp(), 500);
        }

        function handleRegister(e) {
            e.preventDefault();
            
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('regRole').value;
            const level = document.getElementById('regLevel').value;
            const lang = document.getElementById('regLanguage').value;

            if (!name || !email || !password) {
                showAuthMessage('Please fill all fields', 'error');
                return;
            }

            // Create profile
            currentProfile = {
                id: 'user-' + Date.now(),
                full_name: name,
                role: role,
                education_level: level,
                preferred_language: lang
            };

            currentUser = { id: currentProfile.id };
            
            // Save to sessionStorage
            sessionStorage.setItem('imenaProfile', JSON.stringify(currentProfile));
            
            showAuthMessage('Registration successful!', 'success');
            setTimeout(() => showMainApp(), 500);
        }

        function logout() {
            sessionStorage.removeItem('imenaProfile');
            currentProfile = null;
            currentUser = null;
            showAuth();
        }

        function showAuthMessage(message, type) {
            const box = document.getElementById('authMessage');
            box.className = `message-box show ${type}`;
            box.innerHTML = `<span>${type === 'error' ? '❌' : type === 'success' ? '✅' : '⚠️'}</span> ${message}`;
            setTimeout(() => box.classList.remove('show'), 3000);
        }

        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
        }

        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }

            if (!currentProfile) return;

            const isTeacher = currentProfile.role === 'teacher';
            
            // Update sidebar
            document.getElementById('sidebar').className = `sidebar ${isTeacher ? 'teacher-mode' : 'student-mode'}`;
            document.getElementById('avatarInitial').textContent = (currentProfile.full_name || 'U').charAt(0).toUpperCase();

        function getChatInterface(title) {

        // ========== RENDERING FUNCTIONS ==========
        function renderSubjectsGrid() {
            const grid = document.getElementById('subjectsGrid');
            if (!grid) return;

            const level = currentProfile?.education_level || 'S3';
            const lang = currentProfile?.preferred_language || 'english';
            
            const filtered = subjects.filter(s => s.levels.includes(level));
            
            grid.innerHTML = filtered.map(s => {
                const name = s[`name_${lang}`] || s.name_en;
                return `
                    <div class="subject-card" onclick="selectSubject(${s.id})">
                        <div class="subject-icon">${s.icon}</div>
                        <h3>${name}</h3>
                        <p style="color:var(--text-muted); font-size:12px; margin-top:8px;">${s.category}</p>
                    </div>
                `;
            }).join('');
        }

        function renderPracticeGrid() {
            const grid = document.getElementById('practiceGrid');
            if (!grid) return;

            const level = currentProfile?.education_level || 'S3';
            const filtered = subjects.filter(s => s.levels.includes(level)).slice(0, 8);
            
            grid.innerHTML = filtered.map(s => `
                <div class="subject-card" onclick="startPractice(${s.id})">
                    <div class="subject-icon">✏️</div>
                    <h3>${s.name_en} Practice</h3>
                </div>
            `).join('');
        }

        // ========== AI TUTOR FUNCTIONS ==========
        window.sendMessage = async function() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            // Add user message
            addMessage('user', '👤 You', text);
            input.value = '';

            // Show typing indicator
            showTyping();

            // Simulate AI thinking
            await new Promise(r => setTimeout(r, 2000));

            // Generate response
            const response = generateAIResponse(text);
            
            // Remove typing and add response
            removeTyping();
            addMessage('assistant ai-enhanced', '🎓 IMENA AI', response);
        };

        function generateAIResponse(query) {
            const lower = query.toLowerCase();
            const lang = currentProfile?.preferred_language || 'english';
            
            // Get random Rwanda example
            const allExamples = Object.values(rwandaExamples).flat();
            const randomExample = allExamples[Math.floor(Math.random() * allExamples.length)];

            // Subject-specific responses
            if (lower.includes('math') || lower.includes('calculate') || lower.includes('add')) {
                return `
                    <h3>📐 Step-by-Step Mathematics</h3>
                    <div><strong>Step 1:</strong> Identify what the problem is asking.</div>
                    <div><strong>Step 2:</strong> Choose the right operation (+, -, ×, ÷).</div>
                    <div><strong>Step 3:</strong> Calculate carefully.</div>
                    <div><strong>Step 4:</strong> Check if your answer makes sense.</div>
                    <div class="real-life">
                        <strong>🌍 Rwanda Example:</strong> If a farmer sells 250 kg of coffee at 1,200 RWF per kg, how much do they earn?<br>
                        250 × 1,200 = 300,000 RWF
                    </div>
                    <div class="example-box">
                        <strong>✏️ Practice:</strong> A cooperative processes 150 kg of tea daily. How much in 7 days?
                    </div>
                `;
            }
            
            if (lower.includes('biology') || lower.includes('plant') || lower.includes('animal')) {
                return `
                    <h3>🌱 Biology in Rwanda</h3>
                    <div><strong>Key Concept:</strong> All living things interact with their environment.</div>
                    <div class="real-life">
                        <strong>🇷🇼 Local Example:</strong> ${randomExample}
                    </div>
                    <div><strong>Did you know?</strong> Nyungwe Forest is home to 13 species of primates!</div>
                `;
            }

            if (lower.includes('history') || lower.includes('rwanda') || lower.includes('amateka')) {
                return `
                    <h3>📜 Amateka y'u Rwanda</h3>
                    <div><strong>Before colonization:</strong> Rwanda was a unified kingdom under one Mwami (king).</div>
                    <div><strong>After 1994:</strong> The country rebuilt using Gacaca courts and unity initiatives.</div>
                    <div class="real-life">
                        <strong>💡 Key Value:</strong> "Ndi Umunyarwanda" - I am Rwandan, promoting national identity.
                    </div>
                `;
            }

            // Default response with Rwanda context
            return `
                <h3>🎓 IMENA Explains</h3>
                <div>Great question! Let me connect this to Rwanda:</div>
                <div class="real-life">
                    <strong>🇷🇼 Did you know?</strong> ${randomExample}
                </div>
                <div>In Rwanda, we learn through <strong>Ubumwe</strong> (unity) and connect every lesson to our daily life.</div>
                <div class="example-box">
                    <strong>❓ Think about:</strong> How does this topic appear in your community? On your hillside? In Kigali?
                </div>
            `;
        }

        function addMessage(roleClass, sender, content) {
            const container = document.getElementById('chatMessages');
            if (!container) return;

            const div = document.createElement('div');
            div.className = `message ${roleClass}`;
            div.innerHTML = `
                <div class="message-header">${sender}</div>
                <div class="message-content">${content}</div>
            `;
            container.appendChild(div);
            
            // Smooth scroll to new message
            container.scrollTo({
                top: container.scrollHeight,
                behavior: 'smooth'
            });
        }

        function showTyping() {
            const container = document.getElementById('chatMessages');
            const typing = document.createElement('div');
            typing.className = 'message assistant typing';
            typing.id = 'typingIndicator';
            typing.innerHTML = `
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            container.appendChild(typing);
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        }

        function removeTyping() {
            document.getElementById('typingIndicator')?.remove();
        }

        window.clearChat = function() {
            const container = document.getElementById('chatMessages');
            if (container) {
                container.innerHTML = `
                    <div class="message assistant ai-enhanced">
                        <div class="message-header">🎓 IMENA</div>
                        <div class="message-content">
                            <strong>Chat cleared.</strong> Ask me anything about your studies!
                        </div>
                    </div>
                `;
            }
        };

        // ========== SUBJECT SELECTION ==========
        window.selectSubject = function(id) {
            const subject = subjects.find(s => s.id === id);
            if (!subject) return;

            currentSession = {
                id: 'session-' + Date.now(),
                subject: subject
            };

            showSection('ai-tutor', document.querySelectorAll('.nav-item')[2]);
            
            setTimeout(() => {
                const msg = document.getElementById('chatMessages');
                if (msg) {
                    const div = document.createElement('div');
                    div.className = 'message assistant ai-enhanced';
                    div.innerHTML = `
                        <div class="message-header">🎓 IMENA</div>
                        <div class="message-content">
                            <strong>Let's learn ${subject.name_en}!</strong><br><br>
                            I'll explain with examples from Rwanda. What topic would you like to explore?
                        </div>
                    `;
                    msg.appendChild(div);
                    msg.scrollTo({ top: msg.scrollHeight, behavior: 'smooth' });
                }
            }, 100);
        };

        window.startPractice = function(id) {
            alert(`Practice mode for ${subjects.find(s => s.id === id)?.name_en} will generate adaptive questions based on your level.`);
        };

        window.generateLessonPlan = function() {
            document.getElementById('lessonPlanOutput')?.classList.remove('hidden');
            document.getElementById('lessonPlanOutput')?.scrollIntoView({ behavior: 'smooth' });
        };

        // ========== NAVIGATION ==========
        window.showSection = function(section, el) {
            // Hide all sections
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
            
            // Show selected section
            const target = document.getElementById(section + 'Section');
            if (target) target.classList.remove('hidden');

            // Update active nav
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if (el) el.classList.add('active');

            // Close mobile sidebar
            document.getElementById('sidebar').classList.remove('open');

            // Smooth scroll to top
            document.querySelector('.main-content')?.scrollTo({ top: 0, behavior: 'smooth' });

            // Refresh grids if needed
            if (section === 'subjects') renderSubjectsGrid();
            if (section === 'practice') renderPracticeGrid();
        };

        window.toggleSidebar = function() {
            document.getElementById('sidebar').classList.toggle('open');
        };

        window.changeLanguage = function(lang) {
            if (currentProfile) {
                currentProfile.preferred_language = lang;
                sessionStorage.setItem('imenaProfile', JSON.stringify(currentProfile));
                
                // Refresh UI with new language
                renderSubjectsGrid();
                
                // Update welcome message if on chat
                const welcome = document.querySelector('#chatMessages .message.assistant');
                if (welcome) {
                    welcome.innerHTML = `
                        <div class="message-header">🎓 IMENA</div>
                        <div class="message-content">
                            <strong>${lang === 'kinyarwanda' ? 'Muraho!' : 'Hello!'}</strong><br>
                            Language changed to ${lang}.
                        </div>
                    `;
                }
            }
        };

        // ========== GLOBAL FUNCTIONS ==========
        window.showLogin = showLogin;
        window.showRegister = showRegister;
        window.logout = logout;
    </script>
