<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMENA Trainer AI · Rwanda national learning platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ========== MODERN RESET & VARIABLES ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0066cc;
            --primary-light: #0088ff;
            --primary-dark: #004499;
            --secondary: #00d084;
            --accent: #ff6b35;
            --gold: #ffd700;
            --bg-dark: #0a0f1c;
            --bg-card: rgba(20, 28, 47, 0.95);
            --bg-glass: rgba(255, 255, 255, 0.03);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(148, 163, 184, 0.15);
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --teacher-color: #f59e0b;
            --student-color: #10b981;
            --shadow-card: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            --scrollbar-width: 8px;
            --scrollbar-track: rgba(255, 255, 255, 0.02);
            --scrollbar-thumb: rgba(255, 255, 255, 0.1);
            --scrollbar-thumb-hover: rgba(255, 255, 255, 0.2);
        }

        /* ========== CUSTOM SCROLLBARS (BEST IN CLASS) ========== */
        *::-webkit-scrollbar { width: var(--scrollbar-width); height: var(--scrollbar-width); }
        *::-webkit-scrollbar-track { background: var(--scrollbar-track); border-radius: 10px; }
        *::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; transition: background 0.3s; }
        *::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }
        
        html { scroll-behavior: smooth; }
        body, .chat-messages, .sidebar, .main-content, .subjects-grid, .stats-grid {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ========== ACADEMIC BACKGROUND ========== */
        .bg-academic {
            position: fixed; inset: 0; z-index: -2;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 15 L30 8 L40 15 L35 30 L25 30 Z' fill='rgba(0,136,255,0.03)' stroke='rgba(255,255,255,0.02)'/%3E%3Ccircle cx='60' cy='60' r='12' fill='rgba(0,208,132,0.02)'/%3E%3Ctext x='10' y='70' font-family='Inter' font-size='14' fill='rgba(255,255,255,0.01)'%3EREB%3C/text%3E%3C/svg%3E"),
                radial-gradient(circle at 20% 30%, rgba(0,102,204,0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0,208,132,0.08) 0%, transparent 40%);
            background-size: 80px 80px, 100% 100%, 100% 100%;
            opacity: 0.8;
            pointer-events: none;
        }

        .bg-orb {
            position: fixed;
            width: 600px; height: 600px;
            background: radial-gradient(circle at 30% 50%, rgba(0,102,204,0.2), transparent 70%);
            top: -200px; right: -200px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            animation: float 30s infinite alternate;
        }
        
        .bg-orb2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0,208,132,0.15), transparent);
            bottom: -150px; left: -150px;
            top: auto; right: auto;
            animation: float 25s infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(80px, -50px) scale(1.15); }
        }

        /* ========== AUTHENTICATION STYLES ========== */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-box {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 48px;
            padding: 48px;
            width: 100%;
            max-width: 540px;
            box-shadow: var(--shadow-card);
            transform: translateY(0);
            transition: transform 0.4s ease;
        }
        
        .auth-box:hover { transform: translateY(-5px); }

        .logo-icon {
            width: 100px; height: 100px;
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 24px;
            box-shadow: 0 20px 40px rgba(0,102,204,0.5);
        }

        .logo h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 40px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .badge {
            background: rgba(0,208,132,0.2);
            border: 1px solid rgba(0,208,132,0.5);
            color: var(--secondary);
            font-weight: 700;
            padding: 8px 28px;
            border-radius: 60px;
            font-size: 14px;
            display: inline-block;
            margin-top: 12px;
        }

        /* ========== FORM STYLES ========== */
        .form-group { margin-bottom: 24px; }
        
        label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 18px 22px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 24px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--primary-light);
            background: rgba(255,255,255,0.07);
            outline: none;
            transform: scale(1.01);
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(145deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 28px;
            color: white;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::after { width: 300px; height: 300px; }
        .btn-secondary { background: transparent; border: 1px solid var(--border); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 25px 35px -10px rgba(0,102,204,0.5); }

        .auth-switch {
            text-align: center;
            margin-top: 28px;
            color: var(--text-secondary);
        }
        
        .auth-switch a {
            color: var(--primary-light);
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            border-bottom: 1px dashed transparent;
            transition: border-color 0.3s;
        }
        
        .auth-switch a:hover { border-bottom-color: var(--primary-light); }

        .message-box {
            padding: 18px;
            border-radius: 20px;
            display: none;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.4s ease;
            margin-bottom: 20px;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-box.show { display: flex; }
        .error { background: rgba(239,68,68,0.2); border: 1px solid #b91c1c; }
        .success { background: rgba(16,185,129,0.2); border: 1px solid #059669; }
        .warning { background: rgba(245,158,11,0.2); border: 1px solid #b45309; }
        .hidden { display: none !important; }

        /* ========== MAIN LAYOUT ========== */
        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px;
            min-height: 100vh;
        }

        .main-app {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 24px;
            height: calc(100vh - 90px);
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 36px;
            padding: 28px 16px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
            overflow-y: auto;
            max-height: 100%;
        }

        .sidebar.teacher-mode { border-color: rgba(245,158,11,0.5); box-shadow: 0 0 40px rgba(245,158,11,0.15); }
        .sidebar.student-mode { border-color: rgba(16,185,129,0.4); }

        .user-profile {
            display: flex;
            gap: 18px;
            align-items: center;
            padding-bottom: 28px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 28px;
        }

        .avatar {
            width: 70px; height: 70px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 30px;
            position: relative;
            transition: transform 0.3s;
        }
        
        .avatar:hover { transform: scale(1.05); }
        .avatar.teacher { background: linear-gradient(145deg, #f59e0b, #d97706); }
        .avatar.student { background: linear-gradient(145deg, #10b981, #059669); }

        .role-badge {
            position: absolute;
            bottom: -2px; right: -2px;
            width: 26px; height: 26px;
            background: var(--bg-dark);
            border: 2px solid var(--bg-card);
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .nav-menu { flex: 1; }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 22px;
            border-radius: 22px;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            margin-bottom: 6px;
        }
        
        .nav-item:hover {
            background: rgba(255,255,255,0.06);
            color: white;
            transform: translateX(5px);
        }
        
        .nav-item.active {
            background: linear-gradient(90deg, rgba(0,102,204,0.25), transparent);
            color: white;
            border-left: 5px solid var(--primary-light);
        }

        .language-selector {
            margin-top: auto;
            padding-top: 28px;
            border-top: 1px solid var(--border);
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            max-height: 100%;
            padding-right: 4px;
        }

        .content-header {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 36px;
            padding: 28px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(8px);
            transition: transform 0.3s;
        }
        
        .content-header:hover { transform: translateY(-2px); }

        .header-title h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 30px;
            font-weight: 700;
        }
        
        .header-title p { color: var(--text-secondary); font-size: 15px; }

        /* ========== CHAT INTERFACE ========== */
        .chat-container {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 36px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 85%;
            padding: 26px 30px;
            border-radius: 30px;
            animation: fadeSlideUp 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(145deg, var(--primary), var(--primary-dark));
            border-bottom-right-radius: 8px;
        }

        .message.assistant {
            align-self: flex-start;
            background: rgba(30,35,48,0.8);
            border: 1px solid var(--border);
            border-bottom-left-radius: 8px;
        }

        .message.ai-enhanced {
            border-color: var(--secondary);
            box-shadow: 0 0 30px rgba(0,208,132,0.2);
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            font-weight: 600;
        }

        .ai-badge {
            background: var(--secondary);
            color: black;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 800;
        }

        .real-life {
            background: rgba(0,102,204,0.15);
            padding: 18px;
            border-radius: 20px;
            border-left: 5px solid var(--secondary);
            margin: 16px 0;
        }

        .example-box {
            background: rgba(0,0,0,0.3);
            padding: 18px;
            border-radius: 16px;
            margin: 12px 0;
            border: 1px dashed var(--primary-light);
        }

        .chat-input-container {
            padding: 24px 30px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 20px;
            align-items: flex-end;
            background: rgba(0,0,0,0.2);
        }

        .chat-input {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 20px 26px;
            resize: none;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
            min-height: 70px;
            max-height: 200px;
        }

        .chat-input:focus {
            border-color: var(--primary-light);
            background: rgba(255,255,255,0.07);
            transform: scale(1.01);
            outline: none;
        }

        .send-btn {
            width: 75px;
            height: 75px;
            border-radius: 32px;
            font-size: 30px;
            padding: 0;
        }

        .typing-indicator {
            display: flex;
            gap: 8px;
            padding: 16px 0;
        }

        .typing-dot {
            width: 12px; height: 12px;
            background: var(--primary-light);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        @keyframes typingBounce {
            0%,60%,100% { transform: translateY(0); }
            30% { transform: translateY(-15px); }
        }

        /* ========== SUBJECTS GRID ========== */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 24px;
            max-height: 600px;
            overflow-y: auto;
        }

        .subject-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 30px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
            backdrop-filter: blur(4px);
        }

        .subject-card:hover {
            border-color: var(--primary-light);
            transform: translateY(-8px) scale(1.02);
            background: rgba(255,255,255,0.05);
            box-shadow: 0 20px 30px -10px rgba(0,102,204,0.3);
        }

        .subject-icon {
            width: 80px; height: 80px;
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            margin: 0 auto 20px;
            transition: transform 0.3s;
        }

        .subject-card:hover .subject-icon { transform: rotate(5deg) scale(1.1); }

        /* ========== STATS CARDS ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .stat-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 30px;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary-light);
        }

        .stat-value {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(145deg, white, var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tool-section {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 36px;
            padding: 36px;
            margin-bottom: 24px;
        }

        /* ========== FOOTER ========== */
        .dev-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .dev-footer a {
            color: var(--primary-light);
            font-weight: 700;
            text-decoration: none;
            background: rgba(0,136,255,0.1);
            padding: 6px 20px;
            border-radius: 40px;
            transition: all 0.3s;
        }

        .dev-footer a:hover {
            background: var(--primary);
            color: white;
        }

        /* ========== MOBILE RESPONSIVE ========== */
        @media (max-width: 900px) {
            .main-app { grid-template-columns: 1fr; }
            .sidebar {
                position: fixed;
                left: -320px;
                top: 0;
                height: 100%;
                z-index: 100;
                transition: left 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
            }
            .sidebar.open { left: 0; }
            .mobile-menu-btn { display: block; }
        }

        .mobile-menu-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            font-size: 28px;
            padding: 10px 24px;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.3s;
            display: none;
        }
        
        .mobile-menu-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <!-- Background elements -->
    <div class="bg-academic"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb bg-orb2"></div>

    <!-- Mobile menu button -->
    <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleSidebar()">☰</button>

    <!-- ========== AUTHENTICATION CONTAINER ========== -->
    <div class="auth-container" id="authContainer">
        <div class="auth-box">
            <div class="logo">
                <div class="logo-icon">🧠</div>
                <h1>IMENA Trainer AI</h1>
                <p>REB · RTB · MINEDUC</p>
                <div class="badge">🇷🇼 intelligent national platform</div>
            </div>
            
            <div class="message-box" id="authMessage"></div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="student@reb.rw" value="demo@imena.rw">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••" value="demo123">
                </div>
                <button type="submit" class="btn" id="loginBtn">
                    <span>Sign in</span> <span>→</span>
                </button>
                <div class="auth-switch">
                    New user? <a onclick="showRegister()">Create account</a>
                </div>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="hidden">
                <div class="form-group">
                    <label>Full name</label>
                    <input type="text" id="regName" placeholder="e.g., MUKAMANA Diane">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="name@domain.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="min 6 chars">
                </div>
                <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                    <div class="form-group">
                        <label>Role</label>
                        <select id="regRole">
                            <option value="student">Student</option>
                            <option value="teacher">Teacher</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Level</label>
                        <select id="regLevel">
                            <option value="P1">P1</option>
                            <option value="P2">P2</option>
                            <option value="P3">P3</option>
                            <option value="P4">P4</option>
                            <option value="P5">P5</option>
                            <option value="P6">P6</option>
                            <option value="S1">S1</option>
                            <option value="S2">S2</option>
                            <option value="S3">S3</option>
                            <option value="S4">S4</option>
                            <option value="S5">S5</option>
                            <option value="S6">S6</option>
                            <option value="TVET1">TVET Level 1</option>
                            <option value="TVET2">TVET Level 2</option>
                            <option value="TVET3">TVET Level 3</option>
                            <option value="TVET4">TVET Level 4</option>
                            <option value="TVET5">TVET Level 5</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Language</label>
                    <select id="regLanguage">
                        <option value="english">🇬🇧 English</option>
                        <option value="kinyarwanda">🇷🇼 Kinyarwanda</option>
                        <option value="french">🇫🇷 French</option>
                        <option value="kiswahili">🇹🇿 Kiswahili</option>
                    </select>
                </div>
                <button type="submit" class="btn" id="registerBtn">
                    <span>Register</span> <span>→</span>
                </button>
                <div class="auth-switch">
                    <a onclick="showLogin()">← Back to login</a>
                </div>
            </form>
        </div>
    </div>

    <!-- ========== MAIN APPLICATION ========== -->
    <div class="app-container hidden" id="mainApp">
        <div class="main-app">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="user-profile">
                    <div class="avatar" id="userAvatar">

            const lang = currentProfile?.preferred_language || 'english';
            
            const filtered = subjects.filter(s => s.levels.includes(level));
            
            grid.innerHTML = filtered.map(s => {
                const name = s[`name_${lang}`] || s.name_en;
                return `
                    <div class="subject-card" onclick="selectSubject(${s.id})">
                        <div class="subject-icon">${s.icon}</div>
                        <h3>${name}</h3>
                        <p style="color:var(--text-muted); font-size:12px; margin-top:8px;">${s.category}</p>
                    </div>
                `;
            }).join('');
        }

        function renderPracticeGrid() {
            const grid = document.getElementById('practiceGrid');
            if (!grid) return;

            const level = currentProfile?.education_level || 'S3';
            const filtered = subjects.filter(s => s.levels.includes(level)).slice(0, 8);
            
            grid.innerHTML = filtered.map(s => `
                <div class="subject-card" onclick="startPractice(${s.id})">
                    <div class="subject-icon">✏️</div>
                    <h3>${s.name_en} Practice</h3>
                </div>
            `).join('');
        }

        // ========== AI TUTOR FUNCTIONS ==========
        window.sendMessage = async function() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            // Add user message
            addMessage('user', '👤 You', text);
            input.value = '';

            // Show typing indicator
            showTyping();

            // Simulate AI thinking
            await new Promise(r => setTimeout(r, 2000));

            // Generate response
            const response = generateAIResponse(text);
            
            // Remove typing and add response
            removeTyping();
            addMessage('assistant ai-enhanced', '🎓 IMENA AI', response);
        };

        function generateAIResponse(query) {
            const lower = query.toLowerCase();
            const lang = currentProfile?.preferred_language || 'english';
            
            // Get random Rwanda example
            const allExamples = Object.values(rwandaExamples).flat();
            const randomExample = allExamples[Math.floor(Math.random() * allExamples.length)];

            // Subject-specific responses
            if (lower.includes('math') || lower.includes('calculate') || lower.includes('add')) {
                return `
                    <h3>📐 Step-by-Step Mathematics</h3>
                    <div><strong>Step 1:</strong> Identify what the problem is asking.</div>
                    <div><strong>Step 2:</strong> Choose the right operation (+, -, ×, ÷).</div>
                    <div><strong>Step 3:</strong> Calculate carefully.</div>
                    <div><strong>Step 4:</strong> Check if your answer makes sense.</div>
                    <div class="real-life">
                        <strong>🌍 Rwanda Example:</strong> If a farmer sells 250 kg of coffee at 1,200 RWF per kg, how much do they earn?<br>
                        250 × 1,200 = 300,000 RWF
                    </div>
                    <div class="example-box">
                        <strong>✏️ Practice:</strong> A cooperative processes 150 kg of tea daily. How much in 7 days?
                    </div>
                `;
            }
            
            if (lower.includes('biology') || lower.includes('plant') || lower.includes('animal')) {
                return `
                    <h3>🌱 Biology in Rwanda</h3>
                    <div><strong>Key Concept:</strong> All living things interact with their environment.</div>
                    <div class="real-life">
                        <strong>🇷🇼 Local Example:</strong> ${randomExample}
                    </div>
                    <div><strong>Did you know?</strong> Nyungwe Forest is home to 13 species of primates!</div>
                `;
            }

            if (lower.includes('history') || lower.includes('rwanda') || lower.includes('amateka')) {
                return `
                    <h3>📜 Amateka y'u Rwanda</h3>
                    <div><strong>Before colonization:</strong> Rwanda was a unified kingdom under one Mwami (king).</div>
                    <div><strong>After 1994:</strong> The country rebuilt using Gacaca courts and unity initiatives.</div>
                    <div class="real-life">
                        <strong>💡 Key Value:</strong> "Ndi Umunyarwanda" - I am Rwandan, promoting national identity.
                    </div>
                `;
            }

            // Default response with Rwanda context
            return `
                <h3>🎓 IMENA Explains</h3>
                <div>Great question! Let me connect this to Rwanda:</div>
                <div class="real-life">
                    <strong>🇷🇼 Did you know?</strong> ${randomExample}
                </div>
                <div>In Rwanda, we learn through <strong>Ubumwe</strong> (unity) and connect every lesson to our daily life.</div>
                <div class="example-box">
                    <strong>❓ Think about:</strong> How does this topic appear in your community? On your hillside? In Kigali?
                </div>
            `;
        }

        function addMessage(roleClass, sender, content) {
            const container = document.getElementById('chatMessages');
            if (!container) return;

            const div = document.createElement('div');
            div.className = `message ${roleClass}`;
            div.innerHTML = `
                <div class="message-header">${sender}</div>
                <div class="message-content">${content}</div>
            `;
            container.appendChild(div);
            
            // Smooth scroll to new message
            container.scrollTo({
                top: container.scrollHeight,
                behavior: 'smooth'
            });
        }

        function showTyping() {
            const container = document.getElementById('chatMessages');
            const typing = document.createElement('div');
            typing.className = 'message assistant typing';
            typing.id = 'typingIndicator';
            typing.innerHTML = `
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            container.appendChild(typing);
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        }

        function removeTyping() {
            document.getElementById('typingIndicator')?.remove();
        }

        window.clearChat = function() {
            const container = document.getElementById('chatMessages');
            if (container) {
                container.innerHTML = `
                    <div class="message assistant ai-enhanced">
                        <div class="message-header">🎓 IMENA</div>
                        <div class="message-content">
                            <strong>Chat cleared.</strong> Ask me anything about your studies!
                        </div>
                    </div>
                `;
            }
        };

        // ========== SUBJECT SELECTION ==========
        window.selectSubject = function(id) {
            const subject = subjects.find(s => s.id === id);
            if (!subject) return;

            currentSession = {
                id: 'session-' + Date.now(),
                subject: subject
            };

            showSection('ai-tutor', document.querySelectorAll('.nav-item')[2]);
            
            setTimeout(() => {
                const msg = document.getElementById('chatMessages');
                if (msg) {
                    const div = document.createElement('div');
                    div.className = 'message assistant ai-enhanced';
                    div.innerHTML = `
                        <div class="message-header">🎓 IMENA</div>
                        <div class="message-content">
                            <strong>Let's learn ${subject.name_en}!</strong><br><br>
                            I'll explain with examples from Rwanda. What topic would you like to explore?
                        </div>
                    `;
                    msg.appendChild(div);
                    msg.scrollTo({ top: msg.scrollHeight, behavior: 'smooth' });
                }
            }, 100);
        };

        window.startPractice = function(id) {
            alert(`Practice mode for ${subjects.find(s => s.id === id)?.name_en} will generate adaptive questions based on your level.`);
        };

        window.generateLessonPlan = function() {
            document.getElementById('lessonPlanOutput')?.classList.remove('hidden');
            document.getElementById('lessonPlanOutput')?.scrollIntoView({ behavior: 'smooth' });
        };

        // ========== NAVIGATION ==========
        window.showSection = function(section, el) {
            // Hide all sections
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
            
            // Show selected section
            const target = document.getElementById(section + 'Section');
            if (target) target.classList.remove('hidden');

            // Update active nav
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if (el) el.classList.add('active');

            // Close mobile sidebar
            document.getElementById('sidebar').classList.remove('open');

            // Smooth scroll to top
            document.querySelector('.main-content')?.scrollTo({ top: 0, behavior: 'smooth' });

            // Refresh grids if needed
            if (section === 'subjects') renderSubjectsGrid();
            if (section === 'practice') renderPracticeGrid();
        };

        window.toggleSidebar = function() {
            document.getElementById('sidebar').classList.toggle('open');
        };

        window.changeLanguage = function(lang) {
            if (currentProfile) {
                currentProfile.preferred_language = lang;
                sessionStorage.setItem('imenaProfile', JSON.stringify(currentProfile));
                
                // Refresh UI with new language
                renderSubjectsGrid();
                
                // Update welcome message if on chat
                const welcome = document.querySelector('#chatMessages .message.assistant');
                if (welcome) {
                    welcome.innerHTML = `
                        <div class="message-header">🎓 IMENA</div>
                        <div class="message-content">
                            <strong>${lang === 'kinyarwanda' ? 'Muraho!' : 'Hello!'}</strong><br>
                            Language changed to ${lang}.
                        </div>
                    `;
                }
            }
        };

        // ========== GLOBAL FUNCTIONS ==========
        window.showLogin = showLogin;
        window.showRegister = showRegister;
        window.logout = logout;
    </script>
</body>
</html>
