<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMENA Teacher AI | Rwanda Basic Education Board - Africa's Premier Educational AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #0066cc;
            --primary-light: #0088ff;
            --primary-dark: #004499;
            --secondary: #00d084;
            --accent: #ff6b35;
            --gold: #ffd700;
            --bg-dark: #0a0f1c;
            --bg-card: rgba(20, 28, 47, 0.7);
            --bg-glass: rgba(255, 255, 255, 0.03);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(148, 163, 184, 0.1);
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --info: #3b82f6;
            --shadow-glow: 0 0 40px rgba(0, 102, 204, 0.15);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
            --teacher-color: #f59e0b;
            --student-color: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 102, 204, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 208, 132, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 107, 53, 0.05) 0%, transparent 70%),
                var(--bg-dark);
        }

        .gradient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: orbFloat 20s ease-in-out infinite;
        }

        .orb-1 { width: 600px; height: 600px; background: linear-gradient(135deg, rgba(0, 102, 204, 0.3), transparent); top: -200px; right: -200px; }
        .orb-2 { width: 400px; height: 400px; background: linear-gradient(135deg, rgba(0, 208, 132, 0.2), transparent); bottom: -100px; left: -100px; animation-delay: -5s; }
        .orb-3 { width: 300px; height: 300px; background: linear-gradient(135deg, rgba(255, 107, 53, 0.15), transparent); top: 50%; left: 50%; animation-delay: -10s; }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }

        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1; pointer-events: none;
        }

        /* Layout */
        .app-container { max-width: 1600px; margin: 0 auto; padding: 24px; min-height: 100vh; }
        .hidden { display: none !important; }

        /* Auth Screens */
        .auth-container {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px; position: relative;
        }

        .auth-box {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 480px;
            box-shadow: var(--shadow-glow), var(--shadow-card);
            position: relative; overflow: hidden;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-box::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-light), transparent);
        }

        .logo { text-align: center; margin-bottom: 40px; }
        .logo-icon {
            width: 90px; height: 90px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 24px; display: inline-flex; align-items: center; justify-content: center;
            font-size: 40px; margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 102, 204, 0.3);
            position: relative; overflow: hidden;
        }
        .logo-icon::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg); animation: shimmer 3s infinite;
        }
        @keyframes shimmer { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }

        .logo h1 {
            font-family: 'Space Grotesk', sans-serif; font-size: 32px; font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--primary-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px; letter-spacing: -0.5px;
        }
        .logo p { color: var(--text-secondary); font-size: 14px; font-weight: 500; }

        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(0, 208, 132, 0.1); border: 1px solid rgba(0, 208, 132, 0.3);
            color: var(--secondary); padding: 6px 12px; border-radius: 20px;
            font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 12px;
        }
        .badge::before { content: ''; width: 6px; height: 6px; background: var(--secondary); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select, textarea {
            width: 100%; padding: 14px 18px; background: var(--bg-glass);
            border: 1px solid var(--border); border-radius: 12px;
            color: var(--text-primary); font-size: 15px;
            transition: all 0.3s ease; font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(0, 136, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }
        input::placeholder { color: var(--text-muted); }

        .btn {
            width: 100%; padding: 16px 24px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none; border-radius: 12px; color: white;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;
            gap: 8px; position: relative; overflow: hidden; font-family: inherit;
        }
        .btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .btn:hover::before { left: 100%; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0, 102, 204, 0.4); }
        .btn-secondary { background: transparent; border: 1px solid var(--border); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.05); border-color: var(--primary-light); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }

        .auth-switch { text-align: center; margin-top: 24px; color: var(--text-secondary); font-size: 14px; }
        .auth-switch a { color: var(--primary-light); text-decoration: none; font-weight: 600; cursor: pointer; transition: color 0.3s; }
        .auth-switch a:hover { color: var(--secondary); }

        .message-box {
            padding: 14px 18px; border-radius: 12px; margin-bottom: 20px;
            font-size: 14px; display: none; align-items: flex-start; gap: 12px;
            border: 1px solid transparent; animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .message-box.show { display: flex; }
        .message-box.error { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); color: #fca5a5; }
        .message-box.success { background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.3); color: #6ee7b7; }
        .message-box.warning { background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.3); color: #fcd34d; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        /* Main App */
        .main-app { display: grid; grid-template-columns: 300px 1fr; gap: 24px; height: calc(100vh - 48px); }

        /* Sidebar - Role Based Styling */
        .sidebar {
            background: var(--bg-card); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 20px;
            padding: 28px; display: flex; flex-direction: column; overflow-y: auto;
            transition: all 0.3s ease;
        }

        .sidebar.teacher-mode {
            border-color: rgba(245, 158, 11, 0.3);
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.1);
        }

        .sidebar.student-mode {
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.1);
        }

        .user-profile { display: flex; align-items: center; gap: 16px; padding-bottom: 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
        
        .avatar { 
            width: 56px; height: 56px; 
            border-radius: 16px; display: flex; align-items: center; justify-content: center; 
            font-weight: 700; font-size: 22px; 
            position: relative;
            overflow: hidden;
        }

        .avatar.teacher {
            background: linear-gradient(135deg, var(--teacher-color), #d97706);
            box-shadow: 0 4px 20px rgba(245, 158, 11, 0.3);
        }

        .avatar.student {
            background: linear-gradient(135deg, var(--student-color), #059669);
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
        }

        .role-badge {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            border: 2px solid var(--bg-card);
        }

        .role-badge.teacher { background: var(--teacher-color); }
        .role-badge.student { background: var(--student-color); }

        .user-info h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .user-info p { font-size: 13px; color: var(--text-secondary); }

        .nav-menu { flex: 1; }
        .nav-item {
            display: flex; align-items: center; gap: 14px; padding: 14px 18px;
            border-radius: 12px; cursor: pointer; transition: all 0.3s ease;
            margin-bottom: 8px; color: var(--text-secondary); font-weight: 500; position: relative;
        }
        .nav-item:hover { background: rgba(255, 255, 255, 0.03); color: var(--text-primary); }
        .nav-item.active {
            background: linear-gradient(135deg, rgba(0, 102, 204, 0.2), rgba(0, 208, 132, 0.1));
            color: var(--text-primary); border: 1px solid rgba(0, 136, 255, 0.3);
        }
        .nav-item.active::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 20px; background: var(--primary-light); border-radius: 0 3px 3px 0; }

        .nav-item.teacher-only {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), transparent);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .nav-item.teacher-only:hover {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), transparent);
            border-color: rgba(245, 158, 11, 0.4);
        }

        .language-selector { margin-top: auto; padding-top: 24px; border-top: 1px solid var(--border); }
        .language-selector label { font-size: 11px; margin-bottom: 10px; }
        .language-selector select { background: rgba(0, 0, 0, 0.3); font-size: 14px; }

        /* Main Content */
        .main-content { display: flex; flex-direction: column; gap: 20px; overflow: hidden; }
        .content-header {
            background: var(--bg-card); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 20px;
            padding: 24px 28px; display: flex; justify-content: space-between; align-items: center;
        }

        .content-header.teacher-header {
            border-color: rgba(245, 158, 11, 0.2);
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.05), var(--bg-card));
        }

        .header-title h2 { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.5px; }
        .header-title p { color: var(--text-secondary); font-size: 14px; }
        .header-actions { display: flex; gap: 12px; }
        .btn-small { padding: 10px 20px; font-size: 13px; width: auto; font-weight: 600; }

        /* Chat Interface */
        .chat-container {
            flex: 1; background: var(--bg-card); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 20px;
            display: flex; flex-direction: column; overflow: hidden; position: relative;
        }

        .chat-messages {
            flex: 1; overflow-y: auto; padding: 28px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .message {
            max-width: 85%; padding: 18px 22px; border-radius: 18px;
            line-height: 1.7; animation: messageSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes messageSlide { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        .message.user {
            align-self: flex-end; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-bottom-right-radius: 4px; box-shadow: 0 4px 20px rgba(0, 102, 204, 0.3);
        }

        .message.assistant { 
            align-self: flex-start; 
            background: var(--bg-glass); 
            border: 1px solid var(--border); 
            border-bottom-left-radius: 4px; 
        }

        .message.ai-enhanced {
            background: linear-gradient(135deg, rgba(0, 208, 132, 0.1), var(--bg-glass));
            border-color: rgba(0, 208, 132, 0.3);
            box-shadow: 0 0 20px rgba(0, 208, 132, 0.1);
        }

        .message-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; font-weight: 600; opacity: 0.9; }
        
        .ai-badge {
            background: linear-gradient(90deg, var(--secondary), var(--primary-light));
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message-content { font-size: 15px; line-height: 1.8; }
        .message-content strong { color: var(--primary-light); font-weight: 600; }
        .message-content h3 { color: var(--secondary); font-size: 16px; margin: 16px 0 8px 0; }
        .message-content ul { margin: 8px 0; padding-left: 20px; }
        .message-content li { margin: 4px 0; }
        .message-content .example-box {
            background: rgba(0, 0, 0, 0.3);
            border-left: 3px solid var(--secondary);
            padding: 12px 16px;
            margin: 12px 0;
            border-radius: 0 8px 8px 0;
            font-style: italic;
        }
        .message-content .real-life {
            background: rgba(0, 102, 204, 0.1);
            border: 1px solid rgba(0, 102, 204, 0.3);
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
        }

        .chat-input-container {
            padding: 24px 28px; border-top: 1px solid var(--border);
            display: flex; gap: 14px; align-items: flex-end; background: rgba(0, 0, 0, 0.2);
        }
        .chat-input { flex: 1; background: var(--bg-glass); border: 1px solid var(--border); border-radius: 16px; padding: 16px 20px; color: var(--text-primary); font-size: 15px; resize: none; min-height: 56px; max-height: 150px; font-family: inherit; transition: all 0.3s; }
        .chat-input:focus { outline: none; border-color: var(--primary-light); background: rgba(255, 255, 255, 0.05); }
        .send-btn { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; padding: 0; flex-shrink: 0; font-size: 20px; }

        /* Subjects Grid */
        .subjects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 28px; }
        .subject-card {
            background: var(--bg-glass); border: 1px solid var(--border);
            border-radius: 20px; padding: 28px; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center; position: relative; overflow: hidden;
        }
        .subject-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, rgba(0, 102, 204, 0.1), transparent); opacity: 0; transition: opacity 0.3s; }
        .subject-card:hover { transform: translateY(-8px); border-color: var(--primary-light); box-shadow: 0 20px 40px rgba(0, 102, 204, 0.2); }
        .subject-card:hover::before { opacity: 1; }
        .subject-icon { width: 72px; height: 72px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 20px; box-shadow: 0 8px 30px rgba(0, 102, 204, 0.3); position: relative; z-index: 1; }
        .subject-card h3 { font-size: 17px; font-weight: 600; margin-bottom: 8px; position: relative; z-index: 1; }
        .subject-card p { font-size: 13px; color: var(--text-secondary); position: relative; z-index: 1; }

        /* Stats & Dashboard */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 28px; }
        .stat-card { background: var(--bg-glass); border: 1px solid var(--border); border-radius: 20px; padding: 24px; position: relative; overflow: hidden; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--primary), var(--secondary)); opacity: 0.5; }
        .stat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .stat-label { font-size: 13px; color: var(--text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-family: 'Space Grotesk', sans-serif; font-size: 36px; font-weight: 700; background: linear-gradient(135deg, var(--text-primary), var(--primary-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 8px 0; }
        .progress-bar { height: 8px; background: rgba(255, 255, 255, 0.05); border-radius: 4px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); border-radius: 4px; transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1); position: relative; }
        .progress-fill::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); animation: progressShine 2s infinite; }
        @keyframes progressShine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* Teacher Tools - Advanced */
        .tools-container { padding: 28px; }
        .tool-section { 
            background: var(--bg-glass); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 28px; 
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }

        .tool-section:hover {
            border-color: rgba(245, 158, 11, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .tool-section h3 { 
            font-family: 'Space Grotesk', sans-serif; 
            font-size: 18px; 
            margin-bottom: 20px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            color: var(--teacher-color);
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .quick-action {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .quick-action:hover {
            background: rgba(245, 158, 11, 0.1);
            border-color: rgba(245, 158, 11, 0.3);
            transform: translateY(-2px);
        }

        .quick-action-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        /* Student Specific Features */
        .learning-path {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), transparent);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .achievement-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin: 4px;
        }

        /* Typing */
        .typing-indicator { display: flex; gap: 6px; padding: 12px 0; }
        .typing-dot { width: 10px; height: 10px; background: var(--primary-light); border-radius: 50%; animation: typing 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-12px); opacity: 1; } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-app { grid-template-columns: 1fr; }
            .sidebar { position: fixed; left: -100%; top: 0; height: 100vh; z-index: 1000; width: 280px; transition: left 0.3s ease; }
            .sidebar.open { left: 0; }

            e.preventDefault();
            if (!canMakeRequest()) return;
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showMessage('Please enter email and password', 'error');
                return;
            }
            
            hideMessage();
            setLoading('loginBtn', true);
            
            try {
                const { data, error } = await db.auth.signInWithPassword({ email, password });
                
                if (error) {
                    if (error.message.includes('Invalid login')) {
                        showMessage('Invalid email or password', 'error');
                    } else if (error.message.includes('Email not confirmed')) {
                        showMessage('Please confirm your email before logging in', 'warning');

                    }
                    setLoading('loginBtn', false);
                    return;
                }
                
                await loadUserProfile(data.user);
                showMainApp();

                showMessage('An error occurred. Please try again.', 'error');
                setLoading('loginBtn', false);

            const email = document.getElementById('regEmail').value.trim();

            const fullName = document.getElementById('regName').value.trim();
            const role = document.getElementById('regRole').value;
            const level = document.getElementById('regLevel').value;
            const language = document.getElementById('regLanguage').value;
            
            if (!email || !password || !fullName) {
                showMessage('Please fill all fields', 'error');
                return;
            }
            
            hideMessage();
            setLoading('registerBtn', true);
            
            try {
                const { data: authData, error: authError } = await db.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            full_name: fullName,
                            role,
                            education_level: level,
                            preferred_language: language
                        }
                    }

                if (authError) {
                    if (authError.message.includes('already registered')) {
                        showMessage('Email already registered. Please log in.', 'error');

                        showMessage(authError.message, 'error');

                    setLoading('registerBtn', false);

                showMessage('Account created! Please check your email to confirm.', 'success');

                console.error('Registration exception:', err);
                showMessage('An error occurred. Please try again.', 'error');
                setLoading('registerBtn', false);

                    ${badge}
                </div>
                <div class="message-content">${formatContent(content)}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function formatContent(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/`(.*?)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
        }

        function showTypingIndicator() {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message assistant typing';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="message-header"><span>🎓</span><span>IMENA is thinking...</span></div>
                <div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function removeTypingIndicator() {
            document.getElementById('typingIndicator')?.remove();
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function clearChat() {
            document.getElementById('chatMessages').innerHTML = `
                <div class="message assistant ai-enhanced">
                    <div class="message-header">
                        <span>🎓</span>
                        <span>IMENA AI</span>
                        <span class="ai-badge">Advanced</span>
                    </div>
                    <div class="message-content">${getWelcomeMessage()}</div>
                </div>
            `;
        }

        // ==========================================
        // APP FUNCTIONS
        // ==========================================
        async function initializeApp() {
            await loadSubjects();
            if (currentProfile.role === 'student') {
                await loadProgress();
            }
        }

        async function loadSubjects() {
            try {
                const { data, error } = await db.from('subject_master').select('*').order('id');
                if (error) throw error;
                subjects = data || getDefaultSubjects();
            } catch (err) {
                subjects = getDefaultSubjects();
            }
            renderSubjects();
        }

        function getDefaultSubjects() {
            return [
                { id: 1, name_en: 'Mathematics', name_kinyarwanda: 'Imibare', name_french: 'Mathématiques', category: 'sciences', applicable_levels: ['P1','P2','P3','P4','P5','P6','S1','S2','S3','S4','S5','S6'] },
                { id: 2, name_en: 'Physics', name_kinyarwanda: 'Fiziki', name_french: 'Physique', category: 'sciences', applicable_levels: ['S1','S2','S3','S4','S5','S6'] },
                { id: 3, name_en: 'Chemistry', name_kinyarwanda: 'Kimiya', name_french: 'Chimie', category: 'sciences', applicable_levels: ['S1','S2','S3','S4','S5','S6'] },
                { id: 4, name_en: 'Biology', name_kinyarwanda: 'Biyoloji', name_french: 'Biologie', category: 'sciences', applicable_levels: ['S1','S2','S3','S4','S5','S6'] },
                { id: 5, name_en: 'English', name_kinyarwanda: 'Igiceerezo', name_french: 'Anglais', category: 'languages', applicable_levels: ['P1','P2','P3','P4','P5','P6','S1','S2','S3','S4','S5','S6'] },
                { id: 6, name_en: 'Kinyarwanda', name_kinyarwanda: 'Kinyarwanda', name_french: 'Kinyarwanda', category: 'languages', applicable_levels: ['P1','P2','P3','P4','P5','P6','S1','S2','S3','S4','S5','S6'] },
                { id: 7, name_en: 'History', name_kinyarwanda: 'Amateka', name_french: 'Histoire', category: 'humanities', applicable_levels: ['P4','P5','P6','S1','S2','S3','S4','S5','S6'] },
                { id: 8, name_en: 'Geography', name_kinyarwanda: 'Iburayi', name_french: 'Géographie', category: 'humanities', applicable_levels: ['P4','P5','P6','S1','S2','S3','S4','S5','S6'] },
                { id: 9, name_en: 'Entrepreneurship', name_kinyarwanda: 'Ubucuruzi', name_french: 'Entrepreneuriat', category: 'technical', applicable_levels: ['S1','S2','S3','S4','S5','S6'] },
                { id: 10, name_en: 'ICT', name_kinyarwanda: 'Tekinologi', name_french: 'TIC', category: 'technical', applicable_levels: ['P4','P5','P6','S1','S2','S3','S4','S5','S6'] }
            ];
        }

        function renderSubjects() {
            const grid = document.getElementById('subjectsGrid');
            if (!grid) return;
            
            const userLevel = currentProfile?.education_level || 'P1';
            const applicable = subjects.filter(s => s.applicable_levels?.includes(userLevel));
            
            grid.innerHTML = applicable.map(s => `
                <div class="subject-card" onclick="selectSubject(${s.id})">
                    <div class="subject-icon">${getSubjectEmoji(s.category)}</div>
                    <h3>${getSubjectName(s)}</h3>
                    <p>${s.category}</p>
                </div>
            `).join('');
        }

        function getSubjectEmoji(cat) {
            const map = { languages: '🗣️', sciences: '🔬', humanities: '📜', arts: '🎨', technical: '💻', religion: '⛪' };
            return map[cat] || '📚';
        }

        function getSubjectName(s) {
            const lang = currentProfile?.preferred_language || 'english';
            return s[`name_${lang}`] || s.name_en;
        }

        function showSection(section, navElement) {
            document.querySelectorAll('.content-section').forEach(el => el.classList.add('hidden'));
            const targetSection = document.getElementById(section + 'Section');
            if (targetSection) targetSection.classList.remove('hidden');
            
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if (navElement) navElement.classList.add('active');
            
            document.getElementById('sidebar').classList.remove('open');
            
            if (section === 'subjects') renderSubjects();
            if (section === 'progress') loadProgress();
        }

        async function selectSubject(id) {
            currentSubject = subjects.find(s => s.id === id);
            if (!currentSubject) return;
            
            // Create new session
            const { data: session } = await db.from('learning_sessions').insert([{
                user_id: currentUser.id,
                subject_id: id,
                session_type: 'lesson',
                title: `${getSubjectName(currentSubject)} - ${new Date().toLocaleDateString()}`,
                language_used: currentProfile.preferred_language
            }]).select().single();
            
            currentSession = session;
            
            // Switch to AI tutor with subject context
            showSection('ai-tutor', document.querySelectorAll('.nav-item')[2]);
            
            // Add subject-specific welcome
            const container = document.getElementById('chatMessages');
            if (container) {
                const div = document.createElement('div');
                div.className = 'message assistant ai-enhanced';
                div.innerHTML = `
                    <div class="message-header">
                        <span>🎓</span>
                        <span>IMENA AI</span>
                        <span class="ai-badge">${getSubjectName(currentSubject)}</span>
                    </div>
                    <div class="message-content">
                        <h3>Welcome to ${getSubjectName(currentSubject)}!</h3>
                        <p>I'm ready to help you master this subject with personalized lessons, real-life examples from Rwanda, and interactive practice.</p>
                        <p><strong>What would you like to learn about today?</strong></p>
                    </div>
                `;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            }
        }

        async function loadProgress() {
            try {
                const { data } = await db.from('progress').select('*, subject_master(*)').eq('user_id', currentUser.id);
                renderProgress(data || []);
            } catch (err) {
                renderProgress([]);
            }
        }

        function renderProgress(data) {
            const grid = document.getElementById('statsGrid');
            if (!grid) return;
            
            if (!data.length) {
                grid.innerHTML = '<div class="stat-card"><div class="stat-value">0%</div><p style="color: var(--text-secondary); margin-top: 8px;">Start learning to track progress!</p></div>';
                return;
            }
            
            grid.innerHTML = data.map(p => `
                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-label">${p.subject_master?.name_en}</span>
                        <span style="color: ${p.mastery_percentage >= 70 ? 'var(--success)' : 'var(--warning)'}">${p.revision_needed ? '⚠️' : '✓'}</span>
                    </div>
                    <div class="stat-value">${Math.round(p.mastery_percentage)}%</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${p.mastery_percentage}%"></div></div>
                </div>
            `).join('');
        }

        function changeLanguage(lang) {
            currentProfile.preferred_language = lang;
            db.from('profiles').update({ preferred_language: lang }).eq('id', currentUser.id);
            
            // Update welcome message
            const welcomeEl = document.getElementById('welcomeMessage');
            if (welcomeEl) welcomeEl.innerHTML = getWelcomeMessage();
        }

        async function logout() {
            await db.auth.signOut();
            currentUser = null;
            currentProfile = null;
            showAuth();
        }

        // Teacher-specific functions
        function generateAILessonPlan() {
            const subject = document.getElementById('lessonSubject')?.value;
            const topic = document.getElementById('lessonTopic')?.value;
            
            if (!subject || !topic) {
                alert('Please fill in all fields');
                return;
            }
            
            const planDiv = document.getElementById('generatedLessonPlan');
            const contentDiv = document.getElementById('lessonPlanContent');
            
            planDiv.classList.remove('hidden');
            contentDiv.innerHTML = `
                <div style="padding: 20px; background: rgba(0,0,0,0.2); border-radius: 12px;">
                    <h4 style="color: var(--secondary); margin-bottom: 16px;">📝 ${topic}</h4>
                    <p><strong>Subject:</strong> ${subjects.find(s => s.id == subject)?.name_en}</p>
                    <p><strong>Level:</strong> ${currentProfile.education_level}</p>
                    <p><strong>Duration:</strong> 40 minutes</p>
                    
                    <h4 style="margin: 20px 0 10px 0;">Learning Objectives:</h4>
                    <ul style="margin-left: 20px;">
                        <li>Understand core concepts of ${topic}</li>
                        <li>Apply knowledge to real-life Rwandan contexts</li>
                        <li>Develop critical thinking skills</li>
                    </ul>
                    
                    <h4 style="margin: 20px 0 10px 0;">Activities:</h4>
                    <ol style="margin-left: 20px;">
                        <li>Introduction with local example (5 min)</li>
                        <li>Interactive explanation (15 min)</li>
                        <li>Group discussion (10 min)</li>
                        <li>Practice exercise (8 min)</li>
                        <li>Summary and homework (2 min)</li>
                    </ol>
                </div>
            `;
        }

        function saveLessonPlan() {
            alert('Lesson plan saved to your library!');
        }

        function exportLessonPlan() {
            alert('Exporting as PDF...');
        }

        function shareLessonPlan() {
            alert('Share link copied to clipboard!');
        }

        function generateSmartAssessment() {
            alert('Smart assessment generated! Check your content library.');
        }

        // Utility functions
        function canMakeRequest() {
            const now = Date.now();
            if (isRateLimited) {
                showMessage('Too many attempts. Please wait...', 'warning');
                return false;
            }
            if (now - lastRequestTime < MIN_REQUEST_INTERVAL) {
                showMessage('Please wait a moment...', 'warning');
                return false;
            }
            lastRequestTime = now;
            return true;
        }

        function showMessage(text, type = 'info') {
            const el = document.getElementById('authMessage');
            if (el) {
                el.textContent = text;
                el.className = 'message-box show ' + type;
            }
        }

        function hideMessage() {
            const el = document.getElementById('authMessage');
            if (el) el.classList.remove('show');
        }
    </script>
</body>
</html>
